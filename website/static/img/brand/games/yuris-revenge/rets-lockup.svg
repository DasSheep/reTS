  <!-- Neutral canonical wordmark. -->
  <g id="yurisRevengeGameWordmark" transform="translate(0 48)">
    <g fill-rule="evenodd" stroke-linejoin="round" filter="url(#shadow)">
      <use href="#rShape" transform="translate(7 9)" fill="url(#goldDepth)" stroke="#160e02" stroke-width="8"/>
      <use href="#eShape" transform="translate(7 9)" fill="url(#goldDepth)" stroke="#160e02" stroke-width="8"/>
    </g>
    <g fill="url(#goldFace)" fill-rule="evenodd" stroke="#7c4b08" stroke-width="5" stroke-linejoin="round" filter="url(#grain)">
      <use href="#rShape"/><use href="#eShape"/>
    </g>
    <g fill="none" stroke="#fff0a1" stroke-width="2.5" stroke-linejoin="round" opacity="0.88">
      <use href="#rShape"/><use href="#eShape"/>
    </g>
    <g stroke-linejoin="miter" filter="url(#shadow)">
      <use href="#tShape" transform="translate(7 9)" fill="url(#orangeDepth)" stroke="#160b04" stroke-width="8"/>
      <use href="#sShape" transform="translate(7 9)" fill="url(#orangeDepth)" stroke="#160b04" stroke-width="8"/>
    </g>
    <g fill="url(#orangeFace)" stroke="#6f2a00" stroke-width="5" stroke-linejoin="miter" filter="url(#grain)">
