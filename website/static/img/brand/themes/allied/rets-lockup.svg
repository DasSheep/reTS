<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">RE-TS Allied themed lockup</title>
  <desc id="desc">The locked RE-TS wordmark over a polished silver Allied eagle, blue winged crest, and extended triangular field.</desc>
  <defs>
    <linearGradient id="alliedRim" x1="0.08" y1="0" x2="0.92" y2="1">
      <stop offset="0" stop-color="#303944"/>
      <stop offset="0.14" stop-color="#fbffff"/>
      <stop offset="0.3" stop-color="#8e9dab"/>
      <stop offset="0.5" stop-color="#e9f1f6"/>
      <stop offset="0.72" stop-color="#66727e"/>
      <stop offset="0.88" stop-color="#cdd9e2"/>
      <stop offset="1" stop-color="#1d2630"/>
    </linearGradient>
    <radialGradient id="alliedField" cx="48%" cy="24%" r="80%">
      <stop offset="0" stop-color="#244f9c"/>
      <stop offset="0.32" stop-color="#102d67"/>
      <stop offset="0.68" stop-color="#071835"/>
      <stop offset="1" stop-color="#020817"/>
    </radialGradient>
    <linearGradient id="alliedWing" x1="0" y1="0" x2="0.82" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.2" stop-color="#aebdca"/>
      <stop offset="0.42" stop-color="#eef5f8"/>
      <stop offset="0.7" stop-color="#687784"/>
      <stop offset="1" stop-color="#c6d2da"/>
    </linearGradient>
    <linearGradient id="alliedSteelFace" x1="0.05" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.18" stop-color="#9eabb7"/>
      <stop offset="0.4" stop-color="#edf4f8"/>
      <stop offset="0.68" stop-color="#5c6875"/>
      <stop offset="1" stop-color="#c7d4dc"/>
    </linearGradient>
    <linearGradient id="alliedSteelDepth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#687784"/>
      <stop offset="0.55" stop-color="#24313e"/>
      <stop offset="1" stop-color="#080e16"/>
    </linearGradient>
    <linearGradient id="alliedBlueFace" x1="0.05" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#b8e7ff"/>
      <stop offset="0.16" stop-color="#398df4"/>
      <stop offset="0.44" stop-color="#6ab8ff"/>
      <stop offset="0.72" stop-color="#1750ba"/>
      <stop offset="1" stop-color="#4a91ef"/>
    </linearGradient>
    <linearGradient id="alliedBlueDepth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16479e"/>
      <stop offset="0.55" stop-color="#09255e"/>
      <stop offset="1" stop-color="#02091b"/>
    </linearGradient>
    <filter id="plateShadow" x="-12%" y="-12%" width="124%" height="138%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="13" stdDeviation="11" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="blueGlow" x="-25%" y="-25%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#2b7cff" flood-opacity="0.9" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="letterShadow" x="-15%" y="-15%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="4" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.82"/>
    </filter>
    <filter id="fieldTexture" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.045" numOctaves="4" seed="57" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded"><feFuncA type="table" tableValues="0 0.16"/></feComponentTransfer>
      <feComposite in="faded" in2="SourceAlpha" operator="in" result="clipped"/>
      <feBlend in="SourceGraphic" in2="clipped" mode="overlay"/>
    </filter>
    <filter id="letterGrain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.024 0.17" numOctaves="3" seed="41" result="noise"/>
      <feComponentTransfer in="noise" result="faded"><feFuncA type="table" tableValues="0 0.11"/></feComponentTransfer>
      <feComposite in="faded" in2="SourceAlpha" operator="in" result="clipped"/>
      <feBlend in="SourceGraphic" in2="clipped" mode="soft-light"/>
    </filter>

    <!-- Locked canonical wordmark silhouettes. -->
    <g id="rShape" transform="translate(154 190) scale(1.14) translate(-2477.90 -662.92)">
      <path fill-rule="evenodd" d="M2654.57 736.70C2652.09 738.73 2648.68 740.26 2644.38 741.32C2640.07 742.38 2635.27 743.07 2629.97 743.40C2624.67 743.74 2619.21 743.91 2613.58 743.92H2604.13L2604.08 712.92H2614.52C2620.48 712.89 2626.11 713.05 2631.42 713.36C2636.71 713.67 2641.36 714.39 2645.34 715.51C2649.31 716.64 2652.46 718.21 2654.79 720.22C2657.10 722.24 2658.27 725.03 2658.28 728.58C2658.28 731.97 2657.05 734.68 2654.57 736.70ZM2737.32 766.72C2746.42 764.13 2753.97 760.96 2759.92 757.24C2765.88 753.51 2770.26 749.14 2773.06 744.13C2775.87 739.12 2777.27 733.14 2777.26 726.19C2777.24 714.72 2773.07 704.96 2764.79 696.90C2756.48 688.84 2745.21 682.28 2730.96 677.21C2716.70 672.15 2700.12 668.50 2681.24 666.27C2662.35 664.04 2656.50 662.92 2635.30 662.95L2477.90 663.22L2478.22 849.49L2604.31 849.28L2604.19 780.05L2661.14 849.18L2802.98 848.94L2716.86 771.54C2724.40 770.04 2731.30 768.44 2737.32 766.72Z"/>
    </g>
    <g id="eShape" transform="translate(545 190) scale(1.14) translate(-2146.62 -662.73)">
      <path d="M2146.62 663.21L2431.30 662.73L2431.38 711.72L2283.88 711.97L2283.91 729.75L2431.41 729.49L2431.49 776.11L2283.99 776.36L2284.02 793.96L2431.23 793.71L2431.32 848.94L2146.94 849.43Z"/>
    </g>
    <path id="tShape" transform="translate(13 -35)" d="M185 488H492L465 553H369V766H268V553H154Z"/>
    <path id="sShape" transform="translate(-12 -35)" d="M537 488H864L839 553H654V600H860V766H521L553 708H736V663H537Z"/>
  </defs>

  <g id="alliedEmblem">
  <!-- Extended square-icon backing for the naturally wide Allied crest. -->
  <g filter="url(#plateShadow)">
    <path d="M290 61H734L915 294L512 958L109 294Z" fill="#050b15" stroke="#101925" stroke-width="12" stroke-linejoin="bevel"/>
    <path d="M309 81H715L884 306L512 916L140 306Z" fill="url(#alliedRim)" stroke="#cbd8e2" stroke-width="5" stroke-linejoin="bevel"/>
    <path d="M335 116H689L839 318L512 856L185 318Z" fill="url(#alliedField)" stroke="#2367d8" stroke-width="8" stroke-linejoin="bevel" filter="url(#fieldTexture)"/>
    <path d="M348 136H676L813 322L512 817L211 322Z" fill="none" stroke="#66b5ff" stroke-width="5" stroke-linejoin="bevel" opacity="0.92" filter="url(#blueGlow)"/>
  </g>

