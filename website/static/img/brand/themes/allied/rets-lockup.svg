        fill="#101923" stroke="#050a10" stroke-width="1.5" stroke-linejoin="bevel"/>
  </g>

  <!-- Locked wordmark geometry, recolored for the Allied themed edition. -->
  <g id="alliedWordmark" transform="translate(0 48)">
    <g fill-rule="evenodd" stroke-linejoin="round" filter="url(#letterShadow)">
      <use href="#rShape" transform="translate(7 9)" fill="url(#alliedSteelDepth)" stroke="#06101c" stroke-width="9"/>
      <use href="#eShape" transform="translate(7 9)" fill="url(#alliedSteelDepth)" stroke="#06101c" stroke-width="9"/>
    </g>
    <g fill="url(#alliedSteelFace)" fill-rule="evenodd" stroke="#1e5eaf" stroke-width="6" stroke-linejoin="round" filter="url(#letterGrain)">
      <use href="#rShape"/><use href="#eShape"/>
    </g>
    <g fill="none" stroke="#f3fbff" stroke-width="2.5" stroke-linejoin="round" opacity="0.9">
      <use href="#rShape"/><use href="#eShape"/>
    </g>
    <g stroke-linejoin="miter" filter="url(#letterShadow)">
      <use href="#tShape" transform="translate(7 9)" fill="url(#alliedBlueDepth)" stroke="#040b16" stroke-width="10"/>
      <use href="#sShape" transform="translate(7 9)" fill="url(#alliedBlueDepth)" stroke="#040b16" stroke-width="10"/>
    </g>
    <g fill="url(#alliedBlueFace)" stroke="#c7d7e3" stroke-width="7" stroke-linejoin="miter" filter="url(#letterGrain)">
      <use href="#tShape"/><use href="#sShape"/>
    </g>
    <g fill="none" stroke="#bde8ff" stroke-width="2.5" stroke-linejoin="miter" opacity="0.94">
      <use href="#tShape"/><use href="#sShape"/>
    </g>
  </g>
