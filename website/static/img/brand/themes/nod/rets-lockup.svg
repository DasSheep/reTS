    </g>
  </g>
  </g>

  <!-- Locked wordmark geometry, centered with the same optical offset as GDI. -->
  <g id="nodWordmark" transform="translate(0 48)">
    <g fill-rule="evenodd" stroke-linejoin="round" filter="url(#letterShadow)">
      <use href="#rShape" transform="translate(7 9)" fill="url(#nodSteelDepth)" stroke="#060709" stroke-width="9"/>
      <use href="#eShape" transform="translate(7 9)" fill="url(#nodSteelDepth)" stroke="#060709" stroke-width="9"/>
    </g>
    <g fill="url(#nodSteelFace)" fill-rule="evenodd" stroke="#61060a" stroke-width="6" stroke-linejoin="round" filter="url(#letterGrain)">
      <use href="#rShape"/>
      <use href="#eShape"/>
    </g>
    <g fill="none" stroke="#f4f6f7" stroke-width="2.5" stroke-linejoin="round" opacity="0.82">
      <use href="#rShape"/>
      <use href="#eShape"/>
    </g>

    <g stroke-linejoin="miter" filter="url(#letterShadow)">
      <use href="#tShape" transform="translate(7 9)" fill="url(#nodRedDepth)" stroke="#050607" stroke-width="10"/>
      <use href="#sShape" transform="translate(7 9)" fill="url(#nodRedDepth)" stroke="#050607" stroke-width="10"/>
    </g>
    <g fill="url(#nodRedFace)" stroke="#bfc4ca" stroke-width="7" stroke-linejoin="miter" filter="url(#letterGrain)">
      <use href="#tShape"/>
      <use href="#sShape"/>
    </g>
    <g fill="none" stroke="#ff7c77" stroke-width="2.5" stroke-linejoin="miter" opacity="0.92">
      <use href="#tShape"/>
      <use href="#sShape"/>
    </g>
  </g>
</svg>
