<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">RE-TS Nod themed lockup</title>
  <desc id="desc">The locked RE-TS wordmark over a crimson angular Nod plate and a blackened steel segmented scorpion.</desc>
  <defs>
    <linearGradient id="nodRim" x1="0.08" y1="0" x2="0.92" y2="1">
      <stop offset="0" stop-color="#16191d"/>
      <stop offset="0.12" stop-color="#f1f3f4"/>
      <stop offset="0.24" stop-color="#656b72"/>
      <stop offset="0.43" stop-color="#171a1e"/>
      <stop offset="0.63" stop-color="#858b91"/>
      <stop offset="0.82" stop-color="#2a2d32"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="nodInnerRim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b080b"/>
      <stop offset="0.35" stop-color="#c2c6ca"/>
      <stop offset="0.5" stop-color="#2a2d32"/>
      <stop offset="0.82" stop-color="#7d090d"/>
      <stop offset="1" stop-color="#17191c"/>
    </linearGradient>
    <radialGradient id="nodField" cx="66%" cy="32%" r="78%">
      <stop offset="0" stop-color="#f52a2f"/>
      <stop offset="0.24" stop-color="#bd0b12"/>
      <stop offset="0.62" stop-color="#700408"/>
      <stop offset="1" stop-color="#270104"/>
    </radialGradient>
    <linearGradient id="nodBlackMetal" x1="0.12" y1="0" x2="0.88" y2="1">
      <stop offset="0" stop-color="#07090b"/>
      <stop offset="0.22" stop-color="#555b64"/>
      <stop offset="0.46" stop-color="#111419"/>
      <stop offset="0.72" stop-color="#343942"/>
      <stop offset="1" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="nodSteelFace" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#f4f5f6"/>
      <stop offset="0.18" stop-color="#858b93"/>
      <stop offset="0.4" stop-color="#d8dbe0"/>
      <stop offset="0.7" stop-color="#4e535b"/>
      <stop offset="1" stop-color="#aeb3ba"/>
    </linearGradient>
    <linearGradient id="nodSteelDepth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4b5057"/>
      <stop offset="0.55" stop-color="#16191d"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="nodRedFace" x1="0.08" y1="0" x2="0.92" y2="1">
      <stop offset="0" stop-color="#ff6c68"/>
      <stop offset="0.18" stop-color="#e21b22"/>
      <stop offset="0.48" stop-color="#ff4340"/>
      <stop offset="0.74" stop-color="#8f050a"/>
      <stop offset="1" stop-color="#d5141a"/>
    </linearGradient>
    <linearGradient id="nodRedDepth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7e0509"/>
      <stop offset="0.55" stop-color="#350104"/>
      <stop offset="1" stop-color="#100102"/>
    </linearGradient>
    <filter id="plateShadow" x="-12%" y="-12%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="13" stdDeviation="11" flood-color="#000" flood-opacity="0.82"/>
    </filter>
    <filter id="letterShadow" x="-15%" y="-15%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="4" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.84"/>
    </filter>
    <filter id="fieldTexture" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.05" numOctaves="4" seed="93" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded">
        <feFuncA type="table" tableValues="0 0.2"/>
      </feComponentTransfer>
      <feComposite in="faded" in2="SourceAlpha" operator="in" result="clipped"/>
      <feBlend in="SourceGraphic" in2="clipped" mode="overlay"/>
    </filter>
    <filter id="letterGrain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.024 0.17" numOctaves="3" seed="41" result="noise"/>
      <feComponentTransfer in="noise" result="faded">
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
      <feComposite in="faded" in2="SourceAlpha" operator="in" result="clipped"/>
      <feBlend in="SourceGraphic" in2="clipped" mode="soft-light"/>
    </filter>

    <!-- Locked canonical wordmark silhouettes. -->
    <g id="rShape" transform="translate(154 190) scale(1.14) translate(-2477.90 -662.92)">
      <path fill-rule="evenodd" d="M2654.57 736.70C2652.09 738.73 2648.68 740.26 2644.38 741.32C2640.07 742.38 2635.27 743.07 2629.97 743.40C2624.67 743.74 2619.21 743.91 2613.58 743.92H2604.13L2604.08 712.92H2614.52C2620.48 712.89 2626.11 713.05 2631.42 713.36C2636.71 713.67 2641.36 714.39 2645.34 715.51C2649.31 716.64 2652.46 718.21 2654.79 720.22C2657.10 722.24 2658.27 725.03 2658.28 728.58C2658.28 731.97 2657.05 734.68 2654.57 736.70ZM2737.32 766.72C2746.42 764.13 2753.97 760.96 2759.92 757.24C2765.88 753.51 2770.26 749.14 2773.06 744.13C2775.87 739.12 2777.27 733.14 2777.26 726.19C2777.24 714.72 2773.07 704.96 2764.79 696.90C2756.48 688.84 2745.21 682.28 2730.96 677.21C2716.70 672.15 2700.12 668.50 2681.24 666.27C2662.35 664.04 2656.50 662.92 2635.30 662.95L2477.90 663.22L2478.22 849.49L2604.31 849.28L2604.19 780.05L2661.14 849.18L2802.98 848.94L2716.86 771.54C2724.40 770.04 2731.30 768.44 2737.32 766.72Z"/>
    </g>
    <g id="eShape" transform="translate(545 190) scale(1.14) translate(-2146.62 -662.73)">
      <path d="M2146.62 663.21L2431.30 662.73L2431.38 711.72L2283.88 711.97L2283.91 729.75L2431.41 729.49L2431.49 776.11L2283.99 776.36L2284.02 793.96L2431.23 793.71L2431.32 848.94L2146.94 849.43Z"/>
    </g>
    <path id="tShape" transform="translate(13 -35)" d="M185 488H492L465 553H369V766H268V553H154Z"/>
    <path id="sShape" transform="translate(-12 -35)" d="M537 488H864L839 553H654V600H860V766H521L553 708H736V663H537Z"/>
  </defs>

  <!-- Low-profile Nod plate. Every point stays inside the 1024 px canvas. -->
  <g id="nodEmblem">
  <g filter="url(#plateShadow)">
    <path d="M337 54H687L984 602L851 923H173L40 602Z" fill="#07080a" stroke="#030405" stroke-width="12" stroke-linejoin="bevel"/>
    <path d="M351 69H673L963 604L838 903H186L61 604Z" fill="url(#nodRim)" stroke="#747a82" stroke-width="5" stroke-linejoin="bevel"/>
    <path d="M374 103H650L920 607L816 861H208L104 607Z" fill="#190104" stroke="url(#nodInnerRim)" stroke-width="18" stroke-linejoin="bevel"/>
    <path d="M387 126H637L891 610L798 833H226L133 610Z" fill="url(#nodField)" stroke="#6d080d" stroke-width="6" stroke-linejoin="bevel" filter="url(#fieldTexture)"/>
    <path d="M390 139H634" fill="none" stroke="#ff7470" stroke-width="4" opacity="0.58"/>
    <path d="M151 609L238 815H786L873 609" fill="none" stroke="#260105" stroke-width="7" opacity="0.72"/>
  </g>

  <!-- Eight-piece scorpion taken from the clean insignia geometry in the
       supplied Nod-embleem TD.svg, scaled as a background device. -->
  <g transform="translate(-300 -60) scale(17)">
    <g transform="matrix(0.11631764 0 0 0.11631762 -99.081201 -31.368873)"
       fill="url(#nodBlackMetal)" stroke="#8f959d" stroke-width="0.95"
       stroke-linejoin="round" opacity="0.8" filter="url(#letterGrain)">
