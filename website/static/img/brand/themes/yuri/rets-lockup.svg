<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">reTS Yuri themed lockup</title>
  <desc id="desc">The locked reTS wordmark over the canonical Yuri faction crest in blackened steel and violet energy.</desc>
  <defs>
    <linearGradient id="yuriRim" x1="0.06" y1="0" x2="0.94" y2="1">
      <stop offset="0" stop-color="#111019"/>
      <stop offset="0.14" stop-color="#d8d7e2"/>
      <stop offset="0.3" stop-color="#565462"/>
      <stop offset="0.5" stop-color="#17151f"/>
      <stop offset="0.72" stop-color="#827e8d"/>
      <stop offset="0.88" stop-color="#2b2734"/>
      <stop offset="1" stop-color="#07060a"/>
    </linearGradient>
    <radialGradient id="yuriField" cx="52%" cy="30%" r="82%">
      <stop offset="0" stop-color="#6a3387"/>
      <stop offset="0.3" stop-color="#35154c"/>
      <stop offset="0.68" stop-color="#170922"/>
      <stop offset="1" stop-color="#06030a"/>
    </radialGradient>
    <linearGradient id="yuriBlackMetal" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#55505e"/>
      <stop offset="0.2" stop-color="#121018"/>
      <stop offset="0.44" stop-color="#35313d"/>
      <stop offset="0.72" stop-color="#08070b"/>
      <stop offset="1" stop-color="#27232e"/>
    </linearGradient>
    <linearGradient id="yuriSteel" x1="0.05" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#f0eef4"/>
      <stop offset="0.18" stop-color="#777582"/>
      <stop offset="0.42" stop-color="#c9c8d0"/>
      <stop offset="0.7" stop-color="#3d3b45"/>
      <stop offset="1" stop-color="#8f8d98"/>
    </linearGradient>
    <linearGradient id="yuriSteelDepth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#575461"/>
      <stop offset="0.55" stop-color="#1d1a24"/>
      <stop offset="1" stop-color="#07060a"/>
    </linearGradient>
    <linearGradient id="yuriPurpleFace" x1="0.05" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#e0a3ff"/>
      <stop offset="0.18" stop-color="#8e3fc1"/>
      <stop offset="0.44" stop-color="#c16af0"/>
      <stop offset="0.72" stop-color="#4b176c"/>
      <stop offset="1" stop-color="#8c38bd"/>
    </linearGradient>
    <linearGradient id="yuriPurpleDepth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#582078"/>
      <stop offset="0.55" stop-color="#280d3b"/>
      <stop offset="1" stop-color="#09030e"/>
    </linearGradient>
    <filter id="plateShadow" x="-14%" y="-14%" width="128%" height="142%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="13" stdDeviation="11" flood-color="#000" flood-opacity="0.86"/>
    </filter>
    <filter id="crestShadow" x="-20%" y="-20%" width="150%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="5" dy="9" stdDeviation="6" flood-color="#000" flood-opacity="0.88"/>
    </filter>
    <filter id="violetGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feFlood flood-color="#a83ce8" flood-opacity="0.92" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="letterShadow" x="-15%" y="-15%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="4" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.84"/>
    </filter>
    <filter id="fieldTexture" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.019 0.05" numOctaves="4" seed="149" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded"><feFuncA type="table" tableValues="0 0.2"/></feComponentTransfer>
      <feComposite in="faded" in2="SourceAlpha" operator="in" result="clipped"/>
      <feBlend in="SourceGraphic" in2="clipped" mode="overlay"/>
    </filter>
    <filter id="letterGrain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.024 0.17" numOctaves="3" seed="41" result="noise"/>
      <feComponentTransfer in="noise" result="faded"><feFuncA type="table" tableValues="0 0.11"/></feComponentTransfer>
      <feComposite in="faded" in2="SourceAlpha" operator="in" result="clipped"/>
      <feBlend in="SourceGraphic" in2="clipped" mode="soft-light"/>
    </filter>

    <!-- Locked canonical wordmark silhouettes. -->
    <g id="rShape" transform="translate(154 190) scale(1.14) translate(-2477.90 -662.92)">
      <path fill-rule="evenodd" d="M2654.57 736.70C2652.09 738.73 2648.68 740.26 2644.38 741.32C2640.07 742.38 2635.27 743.07 2629.97 743.40C2624.67 743.74 2619.21 743.91 2613.58 743.92H2604.13L2604.08 712.92H2614.52C2620.48 712.89 2626.11 713.05 2631.42 713.36C2636.71 713.67 2641.36 714.39 2645.34 715.51C2649.31 716.64 2652.46 718.21 2654.79 720.22C2657.10 722.24 2658.27 725.03 2658.28 728.58C2658.28 731.97 2657.05 734.68 2654.57 736.70ZM2737.32 766.72C2746.42 764.13 2753.97 760.96 2759.92 757.24C2765.88 753.51 2770.26 749.14 2773.06 744.13C2775.87 739.12 2777.27 733.14 2777.26 726.19C2777.24 714.72 2773.07 704.96 2764.79 696.90C2756.48 688.84 2745.21 682.28 2730.96 677.21C2716.70 672.15 2700.12 668.50 2681.24 666.27C2662.35 664.04 2656.50 662.92 2635.30 662.95L2477.90 663.22L2478.22 849.49L2604.31 849.28L2604.19 780.05L2661.14 849.18L2802.98 848.94L2716.86 771.54C2724.40 770.04 2731.30 768.44 2737.32 766.72Z"/>
    </g>
    <g id="eShape" transform="translate(545 190) scale(1.14) translate(-2146.62 -662.73)">
      <path d="M2146.62 663.21L2431.30 662.73L2431.38 711.72L2283.88 711.97L2283.91 729.75L2431.41 729.49L2431.49 776.11L2283.99 776.36L2284.02 793.96L2431.23 793.71L2431.32 848.94L2146.94 849.43Z"/>
    </g>
    <path id="tShape" transform="translate(13 -35)" d="M185 488H492L465 553H369V766H268V553H154Z"/>
    <path id="sShape" transform="translate(-12 -35)" d="M537 488H864L839 553H654V600H860V766H521L553 708H736V663H537Z"/>
  </defs>

  <g id="yuriEmblem">
  <!-- Recessed psychic-field plate shaped to echo the tapered Yuri crest. -->
  <g filter="url(#plateShadow)">
    <path d="M172 72H852Q923 151 902 278L748 914H276L122 278Q101 151 172 72Z"
          fill="#050407" stroke="#040305" stroke-width="13" stroke-linejoin="bevel"/>
    <path d="M191 94H833Q892 161 875 270L727 884H297L149 270Q132 161 191 94Z"
          fill="url(#yuriRim)" stroke="#5d5666" stroke-width="7" stroke-linejoin="bevel"/>
    <path d="M218 126H806Q849 177 838 263L700 844H324L186 263Q175 177 218 126Z"
          fill="url(#yuriField)" stroke="#6d278e" stroke-width="8" stroke-linejoin="bevel" filter="url(#fieldTexture)"/>
    <path d="M234 150H790Q817 187 810 252L681 811H343L214 252Q207 187 234 150Z"
          fill="none" stroke="#bd51ef" stroke-width="5" stroke-linejoin="bevel" opacity="0.78" filter="url(#violetGlow)"/>
  </g>

  <!-- Exact four-path Yuri insignia from the Wikimedia flag SVG; the flag
       rectangle and editor metadata are deliberately omitted. -->
  <g id="yuriInsignia" transform="translate(5 -210) scale(1.35)" filter="url(#crestShadow)">
    <!-- Shallow rear extrusion keeps the crest solid and visibly layered. -->
    <path transform="translate(7 9)" d="M79.285714 295.21935L95 273.79078H638.57143C683.62928 322.68221 672.67068 382.41779 646.07844 435.86889C605.59556 517.24054 496.24431 577.29664 458.57143 595.93363L392.14286 788.07649H365.71429L299.28571 593.79078Z"
          fill="#060408" stroke="#351044" stroke-width="21" stroke-linejoin="round"/>
    <path d="M79.285714 295.21935L95 273.79078H638.57143C683.62928 322.68221 672.67068 382.41779 646.07844 435.86889C605.59556 517.24054 496.24431 577.29664 458.57143 595.93363L392.14286 788.07649H365.71429L299.28571 593.79078Z"
          fill="url(#yuriBlackMetal)" stroke="#1c0c27" stroke-width="19" stroke-linejoin="round"/>
    <path d="M79.285714 295.21935L95 273.79078H638.57143C683.62928 322.68221 672.67068 382.41779 646.07844 435.86889C605.59556 517.24054 496.24431 577.29664 458.57143 595.93363L392.14286 788.07649H365.71429L299.28571 593.79078Z"
          fill="none" stroke="#a83ce8" stroke-width="9" stroke-linejoin="round" filter="url(#violetGlow)"/>
    <g transform="translate(5 7)" fill="url(#yuriSteelDepth)" stroke="#09070c" stroke-width="9" stroke-linejoin="round">
      <path d="M146.0522 309.82195L272.33792 309.8222L330.63633 562.11965Z"/>
      <path d="M313 309.8222H443.42857L377.49492 705.66279Z"/>
      <path d="M483.34735 309.8222L473.38325 380.82595C611.87722 369.03567 522.55188 499.40087 471.98186 549.28353C619.81034 473.56493 704.55591 310.27272 483.34735 309.8222Z"/>
    </g>
    <path d="M146.0522 309.82195L272.33792 309.8222L330.63633 562.11965Z"
          fill="url(#yuriSteel)" stroke="#b38cc8" stroke-width="5" stroke-linejoin="round"/>
    <path d="M313 309.8222H443.42857L377.49492 705.66279Z"
          fill="url(#yuriSteel)" stroke="#b38cc8" stroke-width="5" stroke-linejoin="round"/>
    <path d="M483.34735 309.8222L473.38325 380.82595C611.87722 369.03567 522.55188 499.40087 471.98186 549.28353C619.81034 473.56493 704.55591 310.27272 483.34735 309.8222Z"
          fill="url(#yuriSteel)" stroke="#b38cc8" stroke-width="5" stroke-linejoin="round"/>
  </g>
  </g>

  <!-- Locked wordmark geometry, recolored for the Yuri themed edition. -->
  <g id="yuriWordmark" transform="translate(0 48)">
    <g fill-rule="evenodd" stroke-linejoin="round" filter="url(#letterShadow)">
      <use href="#rShape" transform="translate(7 9)" fill="url(#yuriSteelDepth)" stroke="#07050a" stroke-width="9"/>
      <use href="#eShape" transform="translate(7 9)" fill="url(#yuriSteelDepth)" stroke="#07050a" stroke-width="9"/>
    </g>
    <g fill="url(#yuriSteel)" fill-rule="evenodd" stroke="#652485" stroke-width="6" stroke-linejoin="round" filter="url(#letterGrain)">
      <use href="#rShape"/><use href="#eShape"/>
    </g>
    <g fill="none" stroke="#f1eaf4" stroke-width="2.5" stroke-linejoin="round" opacity="0.9">
      <use href="#rShape"/><use href="#eShape"/>
    </g>
    <g stroke-linejoin="miter" filter="url(#letterShadow)">
      <use href="#tShape" transform="translate(7 9)" fill="url(#yuriPurpleDepth)" stroke="#07040a" stroke-width="10"/>
      <use href="#sShape" transform="translate(7 9)" fill="url(#yuriPurpleDepth)" stroke="#07040a" stroke-width="10"/>
    </g>
    <g fill="url(#yuriPurpleFace)" stroke="#bcb7c2" stroke-width="7" stroke-linejoin="miter" filter="url(#letterGrain)">
      <use href="#tShape"/><use href="#sShape"/>
    </g>
    <g fill="none" stroke="#e2a3ff" stroke-width="2.5" stroke-linejoin="miter" opacity="0.94">
      <use href="#tShape"/><use href="#sShape"/>
    </g>
  </g>
</svg>
