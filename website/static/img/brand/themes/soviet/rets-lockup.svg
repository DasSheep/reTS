    </g>
  </g>
  </g>
  </g>
  </g>
  </g>
  </g>

  <!-- Locked wordmark geometry, recolored for the Soviet themed edition. -->
  <g id="sovietWordmark" transform="translate(0 48)">
    <g fill-rule="evenodd" stroke-linejoin="round" filter="url(#letterShadow)">
      <use href="#rShape" transform="translate(7 9)" fill="url(#sovietGoldDepth)" stroke="#120500" stroke-width="9"/>
      <use href="#eShape" transform="translate(7 9)" fill="url(#sovietGoldDepth)" stroke="#120500" stroke-width="9"/>
    </g>
    <g fill="url(#sovietGoldFace)" fill-rule="evenodd" stroke="#8d1b0d" stroke-width="6" stroke-linejoin="round" filter="url(#letterGrain)">
      <use href="#rShape"/><use href="#eShape"/>
    </g>
    <g fill="none" stroke="#fff17a" stroke-width="2.5" stroke-linejoin="round" opacity="0.9">
      <use href="#rShape"/><use href="#eShape"/>
    </g>
    <g stroke-linejoin="miter" filter="url(#letterShadow)">
      <use href="#tShape" transform="translate(7 9)" fill="url(#sovietRedDepth)" stroke="#110101" stroke-width="10"/>
      <use href="#sShape" transform="translate(7 9)" fill="url(#sovietRedDepth)" stroke="#110101" stroke-width="10"/>
    </g>
    <g fill="url(#sovietRedFace)" stroke="#e3a514" stroke-width="7" stroke-linejoin="miter" filter="url(#letterGrain)">
      <use href="#tShape"/><use href="#sShape"/>
    </g>
    <g fill="none" stroke="#ffd84a" stroke-width="2.5" stroke-linejoin="miter" opacity="0.94">
      <use href="#tShape"/><use href="#sShape"/>
    </g>
  </g>
</svg>
