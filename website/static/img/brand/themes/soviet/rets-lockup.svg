<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">RE-TS Soviet themed lockup</title>
  <desc id="desc">The locked RE-TS wordmark over a reconstructed Soviet gold star, red industrial plate, hammer, and sickle.</desc>
  <defs>
    <linearGradient id="starGold" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#fff36a"/>
      <stop offset="0.24" stop-color="#ffd20c"/>
      <stop offset="0.5" stop-color="#fff05a"/>
      <stop offset="0.76" stop-color="#b97400"/>
      <stop offset="1" stop-color="#f5b900"/>
    </linearGradient>
    <radialGradient id="plateRed" cx="62%" cy="30%" r="82%">
      <stop offset="0" stop-color="#e83227"/>
      <stop offset="0.3" stop-color="#a40d0c"/>
      <stop offset="0.68" stop-color="#550708"/>
      <stop offset="1" stop-color="#1c0305"/>
    </radialGradient>
    <linearGradient id="plateEdge" x1="0.06" y1="0" x2="0.94" y2="1">
      <stop offset="0" stop-color="#17191c"/>
      <stop offset="0.2" stop-color="#84201d"/>
      <stop offset="0.44" stop-color="#260608"/>
      <stop offset="0.7" stop-color="#b53225"/>
      <stop offset="1" stop-color="#090b0d"/>
    </linearGradient>
    <linearGradient id="sovietGoldFace" x1="0" y1="0" x2="0.88" y2="1">
      <stop offset="0" stop-color="#fff38a"/>
      <stop offset="0.2" stop-color="#f3bd16"/>
      <stop offset="0.46" stop-color="#ffe55b"/>
      <stop offset="0.72" stop-color="#9b5700"/>
      <stop offset="1" stop-color="#df9808"/>
    </linearGradient>
    <linearGradient id="sovietGoldDepth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a5a00"/>
      <stop offset="0.55" stop-color="#4c2600"/>
      <stop offset="1" stop-color="#160900"/>
    </linearGradient>
    <linearGradient id="sovietRedFace" x1="0.05" y1="0" x2="0.92" y2="1">
      <stop offset="0" stop-color="#ff6652"/>
      <stop offset="0.18" stop-color="#d91b16"/>
      <stop offset="0.44" stop-color="#f74a35"/>
      <stop offset="0.72" stop-color="#820707"/>
      <stop offset="1" stop-color="#c91712"/>
    </linearGradient>
    <linearGradient id="sovietRedDepth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a0908"/>
      <stop offset="0.55" stop-color="#360304"/>
      <stop offset="1" stop-color="#100102"/>
    </linearGradient>
    <linearGradient id="hammerSteel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff2a0"/>
      <stop offset="0.2" stop-color="#b86709"/>
      <stop offset="0.48" stop-color="#f7ca43"/>
      <stop offset="0.76" stop-color="#6e2604"/>
      <stop offset="1" stop-color="#e49718"/>
    </linearGradient>
    <filter id="plateShadow" x="-14%" y="-14%" width="128%" height="142%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="13" stdDeviation="11" flood-color="#000" flood-opacity="0.84"/>
    </filter>
    <filter id="emblemShadow" x="-20%" y="-20%" width="150%" height="155%" color-interpolation-filters="sRGB">
      <feDropShadow dx="6" dy="10" stdDeviation="6" flood-color="#160000" flood-opacity="0.88"/>
    </filter>
    <filter id="letterShadow" x="-15%" y="-15%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="4" dy="8" stdDeviation="4" flood-color="#000" flood-opacity="0.84"/>
    </filter>
    <filter id="plateTexture" x="-7%" y="-7%" width="114%" height="114%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022 0.065" numOctaves="4" seed="117" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0" result="mono"/>
      <feComponentTransfer in="mono" result="faded"><feFuncA type="table" tableValues="0 0.28"/></feComponentTransfer>
      <feComposite in="faded" in2="SourceAlpha" operator="in" result="clipped"/>
      <feBlend in="SourceGraphic" in2="clipped" mode="overlay"/>
    </filter>
    <filter id="letterGrain" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.024 0.17" numOctaves="3" seed="41" result="noise"/>
      <feComponentTransfer in="noise" result="faded"><feFuncA type="table" tableValues="0 0.12"/></feComponentTransfer>
      <feComposite in="faded" in2="SourceAlpha" operator="in" result="clipped"/>
      <feBlend in="SourceGraphic" in2="clipped" mode="soft-light"/>
    </filter>
    <!-- Upper symbol stays inside the shorter pentagon; the lower handle
         area remains unclipped so both grips can cross onto the star. -->
    <clipPath id="sovietSymbolClip" clipPathUnits="userSpaceOnUse">
      <path transform="translate(512 500) scale(0.88 0.76) translate(-512 -500)"
            d="M314 131H710L810 587L512 856L214 587Z"/>
      <rect x="0" y="500" width="1024" height="524"/>
    </clipPath>

    <!-- Locked canonical wordmark silhouettes. -->
    <g id="rShape" transform="translate(154 190) scale(1.14) translate(-2477.90 -662.92)">
      <path fill-rule="evenodd" d="M2654.57 736.70C2652.09 738.73 2648.68 740.26 2644.38 741.32C2640.07 742.38 2635.27 743.07 2629.97 743.40C2624.67 743.74 2619.21 743.91 2613.58 743.92H2604.13L2604.08 712.92H2614.52C2620.48 712.89 2626.11 713.05 2631.42 713.36C2636.71 713.67 2641.36 714.39 2645.34 715.51C2649.31 716.64 2652.46 718.21 2654.79 720.22C2657.10 722.24 2658.27 725.03 2658.28 728.58C2658.28 731.97 2657.05 734.68 2654.57 736.70ZM2737.32 766.72C2746.42 764.13 2753.97 760.96 2759.92 757.24C2765.88 753.51 2770.26 749.14 2773.06 744.13C2775.87 739.12 2777.27 733.14 2777.26 726.19C2777.24 714.72 2773.07 704.96 2764.79 696.90C2756.48 688.84 2745.21 682.28 2730.96 677.21C2716.70 672.15 2700.12 668.50 2681.24 666.27C2662.35 664.04 2656.50 662.92 2635.30 662.95L2477.90 663.22L2478.22 849.49L2604.31 849.28L2604.19 780.05L2661.14 849.18L2802.98 848.94L2716.86 771.54C2724.40 770.04 2731.30 768.44 2737.32 766.72Z"/>
    </g>
    <g id="eShape" transform="translate(545 190) scale(1.14) translate(-2146.62 -662.73)">
      <path d="M2146.62 663.21L2431.30 662.73L2431.38 711.72L2283.88 711.97L2283.91 729.75L2431.41 729.49L2431.49 776.11L2283.99 776.36L2284.02 793.96L2431.23 793.71L2431.32 848.94L2146.94 849.43Z"/>
    </g>
    <path id="tShape" transform="translate(13 -35)" d="M185 488H492L465 553H369V766H268V553H154Z"/>
    <path id="sShape" transform="translate(-12 -35)" d="M537 488H864L839 553H654V600H860V766H521L553 708H736V663H537Z"/>
  </defs>

  <g id="sovietEmblem">
  <!-- Five-point star reconstructed from the raster reference. -->
  <g filter="url(#plateShadow)">
    <path d="M512 35L625 335L949 350L696 552L783 872L512 692L241 872L328 552L75 350L399 335Z"
          fill="#5d2200" stroke="#2a0700" stroke-width="18" stroke-linejoin="round"/>
    <path d="M512 52L618 348L928 363L684 555L766 847L512 679L258 847L340 555L96 363L406 348Z"
          fill="url(#starGold)" stroke="#ffdf22" stroke-width="5" stroke-linejoin="round" filter="url(#letterGrain)"/>
  </g>

  <!-- Red industrial inverted pentagon, layered directly over the star. -->
  <g transform="translate(512 500) scale(0.88 0.76) translate(-512 -500)" filter="url(#plateShadow)">
    <path d="M300 115H724L832 594L512 886L192 594Z"
          fill="#08090b" stroke="#050506" stroke-width="13" stroke-linejoin="bevel"/>
    <path d="M314 131H710L810 587L512 856L214 587Z"
          fill="url(#plateEdge)" stroke="#4b0a0a" stroke-width="8" stroke-linejoin="bevel"/>
    <path d="M335 154H689L781 574L512 820L243 574Z"
          fill="url(#plateRed)" stroke="#b12a20" stroke-width="7" stroke-linejoin="bevel" filter="url(#plateTexture)"/>
    <path d="M354 175H670" fill="none" stroke="#ff7050" stroke-width="5" opacity="0.55"/>
    <path d="M265 564L512 791L759 564" fill="none" stroke="#340305" stroke-width="9" opacity="0.72"/>
    <!-- One hex-head bolt sits just inside each pentagon vertex. -->
    <g fill="url(#plateEdge)" stroke="#cb392b" stroke-width="4" opacity="0.92">
      <path d="M307 150L320 142L333 150V166L320 174L307 166Z"/>
      <path d="M691 150L704 142L717 150V166L704 174L691 166Z"/>
      <path d="M770 548L784 540L798 548V564L784 572L770 564Z"/>
      <path d="M499 798L512 790L525 798V814L512 822L499 814Z"/>
      <path d="M226 548L240 540L254 548V564L240 572L226 564Z"/>
    </g>
    <g fill="none" stroke="#101114" stroke-width="3" opacity="0.85">
      <path d="M313 153L327 163M697 153L711 163M777 551L791 561M505 801L519 811M233 551L247 561"/>
    </g>
  </g>

  <!-- Clean compound hammer-and-sickle path retained from sovietflag.svg.
       The traced full-page background, glow fragments, and speck artifacts are omitted. -->
  <g clip-path="url(#sovietSymbolClip)">
  <g>
  <g transform="translate(512 500) scale(0.95) translate(-512 -500)">
  <g transform="translate(538 504) scale(0.86 0.95) translate(-512 -480)">
  <g transform="translate(-378 -150) scale(3.36)" filter="url(#emblemShadow)" opacity="0.9">
    <g transform="translate(0 334) scale(0.1 -0.1)" fill-rule="nonzero" stroke-linejoin="round">
